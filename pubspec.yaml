name: bims_mobile_general
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  dio: ^5.3.3
  shared_preferences: ^2.2.1
  go_router: ^12.0.0
  geolocator: ^10.1.0
  image_picker: ^1.0.4
  intl: ^0.19.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  mobile_scanner: ^7.2.0
  url_launcher: ^6.2.5
  table_calendar: ^3.1.3
  firebase_vertexai: ^1.8.3
  firebase_ai: ^2.3.0
  firebase_auth: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/eps_data.json
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/BIMS_logo_m.png"
flutter_native_splash:
  color: "#FFFFFF"
  #background_image: "assets/background.png" # Optional background image
  image: assets/images/BIMS_logo.png
