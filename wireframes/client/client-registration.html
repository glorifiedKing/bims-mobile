<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMS - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #036939; 
            --accent-gold: #f2a948;   
            --bg-light: #F4F7F5;      
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .phone-container {
            width: 375px; height: 812px;
            background-color: var(--white);
            border-radius: 40px; overflow: hidden;
            position: relative; border: 8px solid #111;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        /* HEADER */
        .header {
            height: 20%; background: linear-gradient(180deg, var(--primary-green) 0%, #00331a 100%);
            padding: 50px 25px 20px; color: var(--white); text-align: center;
            border-bottom: 4px solid var(--accent-gold);
        }
        .header h1 { font-size: 18px; letter-spacing: 1px; }
        .header p { font-size: 11px; opacity: 0.8; margin-top: 5px; }

        /* STEPPER INDICATOR */
        .stepper-row {
            display: flex; justify-content: center; align-items: center;
            padding: 20px 0; background: #fff;
        }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; margin: 0 15px; position: relative; }
        .step-dot.active { background: var(--accent-gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .step-dot.active::after { content: ''; position: absolute; width: 20px; height: 20px; border: 1px solid var(--accent-gold); border-radius: 50%; top: -6px; left: -6px; }
        .step-line { width: 40px; height: 2px; background: #eee; }

        /* FORM CONTENT */
        .form-content { padding: 0 25px 100px; height: 70%; overflow-y: auto; }
        .field-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--primary-green); margin-bottom: 8px; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 14px; border: 1px solid #e0e6e0; border-radius: 12px;
            font-size: 14px; background: #fafafa; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent-gold); background: #fff; }

        .info-text { font-size: 11px; color: #666; margin-top: -10px; margin-bottom: 20px; line-height: 1.4; }

        /* BUTTONS */
        .footer-actions {
            position: absolute; bottom: 0; width: 100%; padding: 20px 25px 40px;
            background: white; border-top: 1px solid #eee;
        }
        .btn-primary {
            width: 100%; padding: 16px; background: var(--primary-green);
            color: white; border: none; border-radius: 12px;
            font-weight: 700; font-size: 14px; cursor: pointer;
        }

        /* CONDITIONAL FIELD VISIBILITY */
        .individual, .company, .government { display: none; }
        .individual.active, .company.active, .government.active { display: block; }

        /* STEP VISIBILITY */
        .step-one, .step-two { display: none; }
        .step-one.active, .step-two.active { display: block; }

        /* BUTTON STYLES */
        .btn-secondary {
            width: 100%; padding: 16px; background: #e0e6e0;
            color: var(--primary-green); border: none; border-radius: 12px;
            font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 10px;
        }
        .btn-secondary:hover { background: #d0d6d0; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <h1>CLIENT PORTAL</h1>
            <p>Register in the Building Industry Management System</p>
        </div>

        <div class="stepper-row">
            <div class="step-dot active" id="dot1"></div>
            <div class="step-line" id="line1"></div>
            <div class="step-dot" id="dot2"></div>
            <div class="step-line"></div>
            <div class="step-dot" id="dot3"></div>
        </div>

        <div class="form-content">
            <div class="step-one active">
              <div class="field-group">
                <label>Legal Status</label>
                <select id="legalStatus">
                    <option value="individual">Individual</option>
                    <option value="company">Company / Business</option>
                    <option value="government">Government Entity</option>
                </select>
            </div>
            <div class="individual active">
            <div class="field-group">
                <label>Surname</label>
                <input type="text" placeholder="Enter your surname">
            </div>

            <div class="field-group">
                <label>Given Names</label>
                <input type="text" placeholder="Enter other names">
            </div>

            <div class="field-group">
                <label>Citizenship</label>
                <select id="citizenship">
                    <option value="ugandan">Ugandan Citizen</option>
                    <option value="non-ugandan">Non-Ugandan</option>
                </select>
            </div>

            <div class="field-group">
                <label id="id-label">National ID (NIN)</label>
                <input type="text" placeholder="CM000000000000">
                <p class="info-text">Real-time NIN verification will be conducted with NIRA.</p>
            </div>

            <div class="field-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+256 700 000000">
            </div>
            
            </div>
            
            <div class="company">
            <div class="field-group">
                <label>Tin Number</label>
                <input type="text" placeholder="10034564490">
            </div>
            <div class="field-group">
                <label>Company Registration Number</label>
                <input type="text" placeholder="148484848">
            </div>
            <div class="field-group">
                <label>Company Name</label>
                <input type="text" placeholder="Cresent Holdings">
            </div>
            </div>
            <div class="government">
                <div class="field-group">
                    <label>Tin Number</label>
                    <input type="text" placeholder="10034564490">
                </div>
                <div class="field-group">
                    <label>Name of Department</label>
                    <input type="text" placeholder="Ministry of Works and Transport">
                </div>
            </div>
            
            </div>
            <div class="step-two">
                <div class="field-group">
                    <label>Email</label>
                    <input type="email" placeholder="johndoe@example.com">
                </div>
                <div class="field-group">
                    <label>Password</label>
                    <input type="password" placeholder="*******">
                </div>
                <div class="field-group">
                    <label>Retype Password</label>
                    <input type="password" placeholder="*******">
                </div>
            </div>
        </div>

        <div class="footer-actions">
            <button class="btn-secondary" id="backBtn" onclick="previousStep()" style="display: none;">BACK</button>
            <button class="btn-primary" id="continueBtn" onclick="nextStep()">CONTINUE</button>
            <p style="text-align: center; font-size: 12px; margin-top: 15px; color: #666;" onclick="window.location.href='client-login.html'">
                Already have an account? <span style="color: var(--primary-green); font-weight: 700; cursor: pointer;">Login</span>
            </p>
        </div>
    </div>

    <script>
        let currentStep = 1;

        document.getElementById('legalStatus').addEventListener('change', function() {
            var value = this.value;
            document.querySelector('.individual').classList.remove('active');
            document.querySelector('.company').classList.remove('active');
            document.querySelector('.government').classList.remove('active');
            if (value === 'individual') {
                document.querySelector('.individual').classList.add('active');
            } else if (value === 'company') {
                document.querySelector('.company').classList.add('active');
            } else if (value === 'government') {
                document.querySelector('.government').classList.add('active');
            }
        });

        function nextStep() {
            if (currentStep === 1) {
                document.querySelector('.step-one').classList.remove('active');
                document.querySelector('.step-two').classList.add('active');
                document.getElementById('dot1').classList.remove('active');
                document.getElementById('dot2').classList.add('active');
                document.getElementById('line1').style.background = 'var(--accent-gold)';
                document.getElementById('backBtn').style.display = 'block';
                document.getElementById('continueBtn').textContent = 'SUBMIT';
                currentStep = 2;
            } else if (currentStep === 2) {
                alert('Account created successfully!');
                window.location.href = "client-login.html";
            }
        }

        function previousStep() {
            if (currentStep === 2) {
                document.querySelector('.step-two').classList.remove('active');
                document.querySelector('.step-one').classList.add('active');
                document.getElementById('dot2').classList.remove('active');
                document.getElementById('dot1').classList.add('active');
                document.getElementById('line1').style.background = '#eee';
                document.getElementById('backBtn').style.display = 'none';
                document.getElementById('continueBtn').textContent = 'CONTINUE';
                currentStep = 1;
            }
        }
    </script>

</body>
</html>
