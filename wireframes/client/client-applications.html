<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMS - My Applications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #036939; 
            --accent-gold: #f2a948;   
            --bg-light: #F4F7F5;      
            --white: #FFFFFF;
            --status-review: #FFF9E6;
            --status-text: #B8860B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .phone-container {
            width: 375px; height: 812px;
            background-color: var(--bg-light);
            border-radius: 40px; overflow: hidden;
            position: relative; border: 8px solid #111;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .header {
            height: 15%; background: linear-gradient(180deg, var(--primary-green) 0%, #00331a 100%);
            padding: 40px 25px 10px; color: var(--white);
            border-bottom: 4px solid var(--accent-gold);
        }
        .header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }

        .filter-scroll {
            display: flex; gap: 10px; padding: 15px 20px;
            background: white; overflow-x: auto; border-bottom: 1px solid #eee;
        }
        .chip {
            padding: 6px 15px; border-radius: 20px; font-size: 10px;
            font-weight: 700; white-space: nowrap; border: 1px solid #ddd; color: #666;
        }
        .chip.active { background: var(--primary-green); color: white; border-color: var(--primary-green); }

        .list-area { height: 70%; overflow-y: auto; padding: 15px; padding-bottom: 100px; }

        /* Application Card Design */
        .app-card {
            background: var(--white); border-radius: 15px; padding: 15px;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-left: 4px solid var(--accent-gold);
        }
        .app-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .ref-no { font-size: 13px; font-weight: 700; color: var(--primary-green); }
        .status-badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 5px; }
        
        /* Status Colors */
        .review { background: #FFF9E6; color: #B8860B; }
        .pending { background: #E8F4FD; color: #007BFF; }

        .detail-item { margin-bottom: 8px; }
        .detail-item label { font-size: 9px; color: #999; font-weight: 700; text-transform: uppercase; display: block; }
        .detail-item p { font-size: 11px; color: #333; font-weight: 600; }

        .action-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; padding-top: 12px; border-top: 1px solid #f0f0f0;
        }
        .sub-date { font-size: 10px; color: #888; }
        .btn-download {
            background: #fff; border: 1.5px solid var(--primary-green);
            color: var(--primary-green); border-radius: 8px; padding: 6px 12px;
            font-size: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        /* BOTTOM NAVIGATION */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%; height: 80px;
            background: var(--white); border-top: 1px solid #eee;
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px;
        }
        .nav-item { text-align: center; color: #999; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary-green); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-label { font-size: 10px; font-weight: 600; }

        /* FLOATING ACTION BUTTON */
        .fab {
            position: absolute;
            bottom: clamp(20px, 8vh, 100px);
            right: clamp(16px, 4vw, 24px);
            width: 56px;
            height: 56px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 71, 36, 0.4);
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 9999;
        }
        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(0, 71, 36, 0.6);
        }
        .fab:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <h1>My Submissions</h1>
        </div>

        <div class="filter-scroll">
            <div class="chip active">ALL</div>
            <div class="chip">IN-REVIEW</div>
            <div class="chip">AWAITING ACTION</div>
            <div class="chip">REJECTED</div>
        </div>

        <div class="list-area">
            <div class="app-card">
                <div class="app-header">
                    <span class="ref-no">APP/2026/045</span>
                    <span class="status-badge review">IN-REVIEW</span>
                </div>
                
                <div class="detail-item">
                    <label>Application Type</label>
                    <p>Full Building Permit</p>
                </div>
                
                <div class="detail-item">
                    <label>Building Location</label>
                    <p>Plot 45, Mawanda Road, Kampala</p>
                </div>

                <div class="action-row">
                    <span class="sub-date">Sub: Feb 28, 2026</span>
                    <button class="btn-download" onclick="alert('Downloading Submission Summary PDF...')">
                        📄 SUMMARY PDF
                    </button>
                </div>
            </div>

            <div class="app-card" style="border-left-color: #007BFF;">
                <div class="app-header">
                    <span class="ref-no">APP/2026/112</span>
                    <span class="status-badge pending">AWAITING PAYMENT</span>
                </div>
                
                <div class="detail-item">
                    <label>Application Type</label>
                    <p>Demolition Permit</p>
                </div>
                
                <div class="detail-item">
                    <label>Building Location</label>
                    <p>Plot 5, Jinja Road, Iganga</p>
                </div>

                <div class="action-row">
                    <span class="sub-date">Sub: Mar 02, 2026</span>
                    <button class="btn-download" onclick="alert('Downloading Submission Summary PDF...')">
                        📄 SUMMARY PDF
                    </button>
                </div>
            </div>
            
        </div>
        <a href="client-new-application.html" class="fab">+</a>
        <div class="nav-bar">
            <a class="nav-item" onclick="window.location.href='client-dashboard.html'">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </a>
            <a class="nav-item active" onclick="window.location.href='client-applications.html'">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Applications</span>
            </a>
            <a class="nav-item" onclick="window.location.href='client-invoices.html'">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Invoices</span>
            </a>
            <a class="nav-item" onclick="window.location.href='client-profile.html'">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </a>
        </div>
        
    </div>

</body>
</html>
