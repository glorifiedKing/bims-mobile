<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMS - AI Inspection Camera</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-green: #036939; --accent-gold: #f2a948; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .phone { width: 375px; height: 812px; background: #000; border-radius: 40px; position: relative; border: 8px solid #111; overflow: hidden; }
        
        /* Simulated Camera Feed */
        .camera-feed { position: absolute; top: 0; width: 100%; height: 100%; background: #333; background-size: cover; display: flex; align-items: center; justify-content: center; }
        .scan-line { position: absolute; top: 20%; width: 100%; height: 2px; background: var(--accent-gold); box-shadow: 0 0 15px var(--accent-gold); animation: scan 3s infinite ease-in-out; z-index: 5; }
        
        @keyframes scan { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        /* AR Overlays */
        .ar-box { position: absolute; border: 2px solid #28a745; border-radius: 5px; padding: 5px; background: rgba(40, 167, 69, 0.1); }
        .ar-label { position: absolute; top: -20px; left: 0; background: #28a745; color: white; font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 3px; white-space: nowrap; }

        .hud-top { position: absolute; top: 40px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; z-index: 10; }
        .ai-status { background: rgba(0,0,0,0.6); color: white; padding: 8px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; border: 1px solid var(--accent-gold); }

        .hud-bottom { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 25px 20px 40px; z-index: 10; }
        .project-info { color: white; margin-bottom: 20px; }
        .project-info h3 { font-size: 14px; margin-bottom: 2px; }
        .project-info p { font-size: 10px; color: #ccc; }

        .controls { display: flex; align-items: center; justify-content: space-between; }
        .shutter { width: 65px; height: 65px; border-radius: 50%; border: 4px solid white; background: transparent; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter::after { content: ''; width: 45px; height: 45px; background: white; border-radius: 50%; }
        .shutter:active::after { width: 40px; height: 40px; background: var(--accent-gold); }

        .btn-stop { background: #CC0000; color: white; padding: 12px 18px; border-radius: 12px; font-weight: 700; font-size: 10px; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="camera-feed">
            <div class="scan-line"></div>
            
            <div class="ar-box" style="top: 45%; left: 10%; width: 50%; height: 30%;">
                <span class="ar-label">ACCESSIBILITY: RAMP (1:12 SLOPE) ✓ COMPLIANT</span>
            </div>

            <div class="ar-box" style="top: 25%; right: 5%; width: 25%; height: 15%; border-color: var(--accent-gold);">
                <span class="ar-label" style="background: var(--accent-gold);">FIRE EXIT IDENTIFIED</span>
            </div>
        </div>

        <div class="hud-top">
            <div class="ai-status">🤖 AI VISION: ACTIVE (94% CONFIDENCE)</div>
            <div style="color: white; font-size: 24px;">⚙️</div>
        </div>

        <div class="hud-bottom">
            <div class="project-info">
                <h3>Plot 14, Mutungo - Commercial Hub</h3>
                <p>Permit No: KLA-2026-045-BP | Stage: Superstructure</p>
            </div>
            
            <div class="controls">
                <button class="btn-stop" onclick="alert('Digital Stop Order Interface Initialized...')">🚫 STOP ORDER</button>
                <div class="shutter" onclick="alert('AI Analysis Frame Saved to BIMS Inspection Log')"></div>
                <div onclick="window.location.href='bco-checklist.html'" style="width: 80px; text-align: right; color: white; font-size: 10px; font-weight: 700;">CHECKLIST →</div>
            </div>
        </div>
    </div>
</body>
</html>
